<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STAM · 새 화면설계서 작성</title>
<link rel="stylesheet" href="../assets/fonts/s-core-dream/s-core-dream.css">
<link rel="stylesheet" href="../css/stam.tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font-family:inherit}
html{height:100%}
body{background:var(--bg-base);color:var(--t1);font-family:var(--font);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--font)}
input,select,textarea{font-family:var(--font)}
.dn{display:none!important}

/* ── Topbar ── */
.app-top{position:fixed;top:0;left:0;right:0;z-index:400;height:48px;display:flex;align-items:center;background:#0A0E1A;border-bottom:1px solid rgba(255,255,255,.07)}
.app-top-logo{display:flex;align-items:center;gap:8px;padding:0 16px;height:100%;border-right:1px solid rgba(255,255,255,.07);flex-shrink:0}
.app-top-logo img{width:22px;height:22px;object-fit:contain}
.app-top-logo span{font-size:13px;font-weight:700;color:rgba(255,255,255,.90);letter-spacing:.06em}
.app-top-crumb{display:flex;align-items:center;padding:0 14px;font-size:11px;color:rgba(255,255,255,.30)}
.app-top-crumb span+span::before{content:' › ';margin:0 4px;opacity:.5}
.app-top-crumb span.cur{color:rgba(255,255,255,.68);font-weight:600}
.app-top-flex{flex:1}
.app-top-si{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:11px;color:rgba(255,255,255,.30);flex-shrink:0}
.app-top-si .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.app-top-si.saved .dot{background:#34d399}
.app-top-si.unsaved .dot{background:#f59e0b}

/* ── Selection View ── */
.view-sel{padding-top:48px}
/* Step 1~4 outer width 통일 기준선 — 모든 단계가 동일한 max-width를 사용한다 */
.sel-inner{width:100%;max-width:1080px;margin:0 auto;padding:28px 32px 100px}
.bc{display:flex;align-items:center;font-size:11px;color:var(--t3);margin-bottom:18px}
.bc span+span::before{content:' › ';margin:0 5px;opacity:.4}
.bc span.cur{color:var(--t2);font-weight:600}
.sel-hdr{margin-bottom:24px}
.sel-hdr h1{font-size:21px;font-weight:700;color:var(--t1);margin-bottom:5px;letter-spacing:-.01em}
.sel-hdr p{font-size:12.5px;color:var(--t3);line-height:1.75}

/* Stepper */
.stepper{display:flex;align-items:center;background:var(--bg-sur);border:1px solid var(--bd);border-radius:10px;padding:14px 20px;margin-bottom:20px}
.stp-item{display:flex;align-items:center;gap:10px;flex:1;padding:0 10px;cursor:default}
.stp-item.clickable{cursor:pointer}
.stp-item.clickable:hover .stp-circle{border-color:rgba(139,127,248,.5)}
.stp-circle{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(180,184,200,.22);background:var(--bg-sur2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);flex-shrink:0;transition:all 150ms}
.stp-item.active .stp-circle{background:var(--stam);border-color:var(--stam);color:#fff;box-shadow:0 0 0 3px rgba(139,127,248,.18)}
.stp-item.done .stp-circle{background:var(--pass);border-color:var(--pass);color:#fff}
.stp-info{min-width:0}
.stp-lbl{font-size:10px;color:var(--t3);line-height:1.2}
.stp-name{font-size:12.5px;font-weight:600;color:var(--t2);white-space:nowrap}
.stp-item.active .stp-name{color:var(--t1)}
.stp-item.done .stp-name{color:rgba(52,211,153,.85)}
.stp-conn{flex:none;width:28px;height:1px;background:var(--bd)}
.stp-conn.done{background:rgba(52,211,153,.35)}

/* Chips bar */
.chips-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:16px;min-height:22px}
.sel-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(139,127,248,.1);border:1px solid rgba(139,127,248,.18);color:var(--stam)}
.sel-chip .cl{font-size:9.5px;color:var(--t3);font-weight:500;margin-right:2px}

/* Step card */
.step-card{background:var(--bg-sur);border:1px solid var(--bd);border-radius:12px;padding:24px 24px 20px}
.step-q{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:4px;letter-spacing:-.01em}
.step-q-sub{font-size:12px;color:var(--t3);margin-bottom:20px;line-height:1.7}

/* Service type grid */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.svc-card{background:var(--bg-sur2);border:1.5px solid var(--bd);border-radius:8px;padding:16px 14px;cursor:pointer;transition:border-color 150ms,background 150ms}
.svc-card:hover{border-color:rgba(139,127,248,.35);background:rgba(139,127,248,.04)}
.svc-card.sel{border-color:var(--stam);background:rgba(139,127,248,.09);box-shadow:0 0 0 3px rgba(139,127,248,.12)}
.svc-ico{width:32px;height:32px;border-radius:8px;background:var(--bg-sur3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.svc-ico svg{width:15px;height:15px;color:var(--stam)}
.svc-name{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.svc-desc{font-size:11px;color:var(--t3);line-height:1.6}

/* Area grid */
.area-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.area-card{background:var(--bg-sur2);border:1.5px solid var(--bd);border-radius:10px;padding:22px 18px;cursor:pointer;transition:border-color 150ms,background 150ms}
.area-card:hover{border-color:rgba(139,127,248,.35);background:rgba(139,127,248,.04)}
.area-card.sel{border-color:var(--stam);background:rgba(139,127,248,.09);box-shadow:0 0 0 3px rgba(139,127,248,.12)}
.area-badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:5px;font-size:11px;font-weight:700;background:rgba(139,127,248,.12);border:1px solid rgba(139,127,248,.2);color:var(--stam);margin-bottom:10px}
.area-title{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:6px}
.area-desc{font-size:12px;color:var(--t3);line-height:1.7;margin-bottom:10px}
.area-eg-lbl{font-size:9.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.area-examples{font-size:11.5px;color:var(--t2);line-height:1.7}

/* Template grid */
.tmpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tmpl-card{background:var(--bg-sur2);border:1.5px solid var(--bd);border-radius:8px;padding:14px 13px;cursor:pointer;transition:border-color 150ms,background 150ms}
.tmpl-card:hover{border-color:rgba(139,127,248,.35);background:rgba(139,127,248,.04)}
.tmpl-card.sel{border-color:var(--stam);background:rgba(139,127,248,.09);box-shadow:0 0 0 3px rgba(139,127,248,.12)}
.tmpl-name{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.tmpl-tgt{font-size:10px;color:var(--stam);font-weight:600;margin-bottom:5px}
.tmpl-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.tmpl-tag{font-size:10px;color:var(--t3);background:var(--bg-sur3);border:1px solid var(--bd);padding:1px 7px;border-radius:4px}
.tmpl-desc{font-size:11px;color:var(--t3);line-height:1.6;margin-bottom:8px}
.tmpl-sl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.tmpl-si{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--t2);margin-bottom:2px}
.tmpl-si::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--t3);flex-shrink:0}

/* Step 4 */
.s4-wrap{display:grid;grid-template-columns:1fr 268px;gap:18px;align-items:start}
.fgrp{margin-bottom:14px}
.flbl{display:block;font-size:11.5px;font-weight:600;color:var(--t2);margin-bottom:5px}
.flbl .req{color:var(--fail);margin-left:2px}
.finp{width:100%;padding:8px 11px;background:var(--bg-sur2);border:1px solid var(--bd);border-radius:6px;color:var(--t1);font-size:13px;outline:none;transition:border-color 150ms,box-shadow 150ms}
.finp:focus{border-color:rgba(139,127,248,.5);box-shadow:0 0 0 2px rgba(139,127,248,.12)}
.finp::placeholder{color:var(--t3)}
.fhint{font-size:10.5px;color:var(--t3);margin-top:3px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
textarea.finp{resize:vertical;min-height:68px;line-height:1.6}
.st-radios{display:flex;gap:7px}
.st-r{display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--bg-sur2);font-size:12px;color:var(--t2);transition:all 150ms;flex:1}
.st-r input{display:none}
.st-r:has(input:checked){border-color:var(--stam);background:rgba(139,127,248,.1);color:var(--stam)}
.st-r:hover{border-color:rgba(139,127,248,.3)}

/* Summary panel */
.sum-panel{background:var(--bg-sur);border:1px solid var(--bd);border-radius:10px;padding:16px 14px;position:sticky;top:68px}
.sum-ttl{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.sum-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.sum-lbl{font-size:10px;color:var(--t3);width:80px;flex-shrink:0;padding-top:1px}
.sum-val{font-size:11.5px;font-weight:600;color:var(--t1)}
.sum-blocks{margin-top:12px;padding-top:10px;border-top:1px solid var(--bd);text-align:center}
.sum-num{font-size:28px;font-weight:700;color:var(--stam);line-height:1}
.sum-sub{font-size:10.5px;color:var(--t3);margin-top:3px}

/* Footer bar */
.sel-footer{position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--bg-sur);border-top:1px solid var(--bd);padding:12px 32px}
.sel-footer-inner{max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;border:1px solid var(--bd);background:var(--bg-sur2);color:var(--t2);transition:all 150ms}
.btn:hover:not(:disabled){border-color:var(--bd-s);color:var(--t1)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-p{background:var(--stam);border-color:var(--stam);color:#fff}
.btn-p:hover:not(:disabled){background:#7B6FE8;border-color:#7B6FE8}

/* ── Editor View ── */
.view-ed{padding-top:48px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.ctx-bar{display:flex;align-items:center;gap:8px;padding:0 18px;height:44px;background:var(--bg-sur);border-bottom:1px solid var(--bd);flex-shrink:0}
.ctx-back{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--t3);padding:4px 9px;border-radius:5px;border:1px solid var(--bd);background:none;transition:all 120ms;flex-shrink:0}
.ctx-back:hover{color:var(--t1);border-color:var(--bd-s)}
.ctx-back svg{width:11px;height:11px}
.ctx-sep{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.ctx-id{font-size:12px;font-weight:700;color:var(--t1);font-family:var(--mono);flex-shrink:0}
.ctx-name{font-size:12.5px;color:var(--t2);flex-shrink:0}
.ctx-flex{flex:1}
.ctx-chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:4px;font-size:10.5px;font-weight:600;background:rgba(139,127,248,.1);border:1px solid rgba(139,127,248,.18);color:var(--stam);flex-shrink:0}
.ctx-chip.sc{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.2);color:var(--pass)}
.ctx-change{padding:4px 12px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid rgba(139,127,248,.28);background:rgba(139,127,248,.07);color:var(--stam);transition:all 150ms;flex-shrink:0}
.ctx-change:hover{background:rgba(139,127,248,.14)}

/* Workbench */
.workbench{display:flex;flex:1;overflow:hidden}

/* Component Library */
.comp-lib{width:228px;flex-shrink:0;background:var(--bg-sur);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.cl-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--bd);flex-shrink:0}
.cl-ttl{font-size:11.5px;font-weight:700;color:var(--t2)}
.cl-body{flex:1;overflow-y:auto;padding:4px;scrollbar-width:thin}
.cl-body::-webkit-scrollbar{width:3px}
.cl-body::-webkit-scrollbar-thumb{background:var(--bd-s);border-radius:99px}
.comp-cat{margin-bottom:1px}
.cc-hdr{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;user-select:none;transition:background 120ms}
.cc-hdr:hover{background:rgba(255,255,255,.04)}
.cc-chev{width:9px;height:9px;color:var(--t3);margin-left:auto;transition:transform 180ms;flex-shrink:0}
.comp-cat.open .cc-chev{transform:rotate(180deg)}
.cc-items{display:none;padding:2px 4px 4px;flex-direction:column;gap:1px}
.comp-cat.open .cc-items{display:flex}
.comp-item{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:5px;font-size:11.5px;color:var(--t2);cursor:grab;transition:background 120ms,color 120ms}
.comp-item:hover{background:rgba(255,255,255,.05);color:var(--t1)}
.ci-dot{width:4px;height:4px;border-radius:50%;background:var(--t3);flex-shrink:0}
.ci-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ref-badge{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:rgba(139,127,248,.12);color:var(--stam);border:1px solid rgba(139,127,248,.18);flex-shrink:0;letter-spacing:.02em}

/* Wireframe Canvas */
.wf-canvas{flex:1;overflow-y:auto;background:var(--bg-base);scrollbar-width:thin}
.wf-canvas::-webkit-scrollbar{width:4px}
.wf-canvas::-webkit-scrollbar-thumb{background:var(--bd-s);border-radius:99px}
.wf-inner{padding:18px 20px 80px}
.canvas-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.canvas-info{}
.canvas-ttl{font-size:13px;font-weight:700;color:var(--t2)}
.canvas-sub{font-size:11px;color:var(--t3);margin-top:1px}
.canvas-prev-btn{padding:5px 13px;border-radius:6px;font-size:11.5px;font-weight:600;border:1px solid var(--bd);background:var(--bg-sur);color:var(--t2);transition:all 150ms}
.canvas-prev-btn:hover{border-color:var(--stam);color:var(--stam)}

.wf-block{display:flex;align-items:stretch;border:1px solid var(--bd);border-radius:8px;background:var(--bg-sur);margin-bottom:6px;transition:border-color 150ms,box-shadow 150ms;cursor:pointer}
.wf-block:hover{border-color:rgba(139,127,248,.3)}
.wf-block.sel{border-color:var(--stam);box-shadow:0 0 0 2px rgba(139,127,248,.14)}
.wf-block.hidden{opacity:.4}
.wf-num{width:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);border-right:1px solid var(--bd);font-family:var(--mono)}
.wf-block.sel .wf-num{color:var(--stam);border-color:rgba(139,127,248,.25)}
.wf-body{flex:1;padding:9px 13px;display:flex;flex-direction:column;gap:3px;min-width:0}
.wf-bname{font-size:13px;font-weight:600;color:var(--t1)}
.wf-bdesc{font-size:11px;color:var(--t3)}
.wf-acts{display:flex;align-items:center;gap:1px;padding:0 8px;border-left:1px solid var(--bd);opacity:0;transition:opacity 120ms}
.wf-block:hover .wf-acts{opacity:1}
.wf-act{width:26px;height:26px;border-radius:5px;border:none;background:none;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:all 120ms;flex-shrink:0}
.wf-act:hover{background:var(--bg-sur2);color:var(--t1)}
.wf-act.del:hover{color:#ef4444}
.wf-act svg{width:13px;height:13px;pointer-events:none}

/* ── Drag Handle ── */
.wf-drag-handle{
  width:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  cursor:grab;color:var(--t3);opacity:.22;transition:opacity 150ms,color 150ms;
  border-right:1px solid var(--bd);
}
.wf-block:hover .wf-drag-handle{opacity:.55}
.wf-drag-handle:hover{opacity:1;color:var(--stam)}
.wf-drag-handle:active{cursor:grabbing;opacity:1;color:var(--stam)}
.wf-drag-handle svg{pointer-events:none}
/* Dragging state — UI preview only, no real DnD */
.wf-block.is-dragging{
  border-color:var(--stam);
  box-shadow:0 4px 18px rgba(84,81,232,.22),0 0 0 2px rgba(84,81,232,.16);
  background:rgba(84,81,232,.06);
  opacity:.92;
  position:relative;z-index:10;
}
.wf-block.is-dragging .wf-drag-handle{opacity:1;color:var(--stam);cursor:grabbing}
/* Drop position indicator (animated horizontal line) */
.wf-drop-indicator{
  height:3px;border-radius:2px;margin:-3px 0 3px;
  background:linear-gradient(90deg,transparent,var(--stam) 8%,var(--stam) 92%,transparent);
  animation:wfDropPulse 900ms ease-in-out infinite alternate;
}
@keyframes wfDropPulse{from{opacity:.5}to{opacity:1}}
/* Drop target placeholder row */
.wf-drop-placeholder{
  border:2px dashed rgba(84,81,232,.3);
  border-radius:8px;height:48px;margin-bottom:6px;
  background:rgba(84,81,232,.04);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:rgba(139,127,248,.55);font-style:italic;
}

/* Inspector */
.inspector{width:274px;flex-shrink:0;background:var(--bg-sur);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.insp-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--bd);flex-shrink:0}
.insp-ttl{font-size:11.5px;font-weight:700;color:var(--t2)}
.insp-sub{font-size:10px;color:var(--t3);margin-top:1px}
.insp-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;text-align:center;gap:6px}
.insp-ico{width:40px;height:40px;border-radius:10px;background:var(--bg-sur2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.insp-ico svg{width:18px;height:18px;color:var(--t3)}
.insp-em-msg{font-size:12px;color:var(--t2);font-weight:600;line-height:1.5}
.insp-em-sub{font-size:11px;color:var(--t3);line-height:1.65}
.insp-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.insp-tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.insp-tab{flex:1;padding:7px 3px;font-size:10px;font-weight:600;text-align:center;color:var(--t3);border:none;background:none;border-bottom:2px solid transparent;transition:color 150ms,border-color 150ms;cursor:pointer}
.insp-tab.on{color:var(--stam);border-bottom-color:var(--stam)}
.insp-tab:hover:not(.on){color:var(--t2)}
.insp-panel{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin}
.insp-panel::-webkit-scrollbar{width:3px}
.insp-panel::-webkit-scrollbar-thumb{background:var(--bd-s);border-radius:99px}
.if{margin-bottom:12px}
.iflbl{font-size:10px;font-weight:700;color:var(--t3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.ifinp{width:100%;padding:6px 9px;background:var(--bg-sur2);border:1px solid var(--bd);border-radius:5px;color:var(--t1);font-size:12px;outline:none;transition:border-color 150ms}
.ifinp:focus{border-color:rgba(139,127,248,.5)}
.ifdiv{height:1px;background:var(--bd);margin:10px 0}
.ifseclbl{font-size:9.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;margin-top:12px}
.irg{display:flex;flex-direction:column;gap:4px}
.iri{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:5px;border:1px solid var(--bd);background:var(--bg-sur2);font-size:11.5px;color:var(--t2);cursor:pointer;transition:all 120ms}
.iri input{display:none}
.iri:has(input:checked){border-color:var(--stam);background:rgba(139,127,248,.09);color:var(--stam)}
.iri:hover{border-color:rgba(139,127,248,.3)}

  form:{id:'SC-001',name:'',domain:'',owner:'',status:'draft',memo:''},
  blocks:[], selBlock:null, inspTab:'props', saveStatus:'unsaved',
};

function svcName(){ return S.svc ? SVC.find(s=>s.id===S.svc)?.name||'' : ''; }
function areaName(){ return S.area==='front'?'Front':S.area==='admin'?'Admin':''; }
function tmplName(){ return S.tmpl ? S.tmpl.name : ''; }
function stLabel(s){ return {draft:'초안',review:'검토중',confirmed:'확정'}[s]||'초안'; }

function autoId(){
  if(!S.tmpl) return 'SC-001';
  const m={home:'MAIN',feed:'FEED',list:'LIST',detail:'DTL',cart:'CART',order:'ORD',mypage:'MYP',complete:'DONE',dashboard:'DASH',form:'FORM',approve:'APPR',setting:'SET',landing:'LAND',faq:'FAQ',apply:'APPLY',status:'STAT',write:'WRITE',blank:'BLANK','blank-adm':'BLANK'};
  return 'SC-'+(m[S.tmpl.id]||S.tmpl.id.toUpperCase().slice(0,4))+'-001';
}

// ─── STEPPER ─────────────────────────────────────────────────────────
function renderStepper(){
  const steps=['서비스 유형','Front/Admin','Page Template','기본 정보'];
  let h='';
  steps.forEach((name,i)=>{
    const n=i+1, done=n<S.step, active=n===S.step, click=done;
    const chk=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:13px;height:13px"><path d="M4.5 12.75l6 6 9-13.5"/></svg>`;
    if(i>0) h+=`<div class="stp-conn${done?' done':''}"></div>`;
    h+=`<div class="stp-item${active?' active':''}${done?' done':''}${click?' clickable':''}" ${click?`onclick="goToStep(${n})"`:''}>
      <div class="stp-circle">${done?chk:n}</div>
      <div class="stp-info"><div class="stp-lbl">Step ${n}</div><div class="stp-name">${name}</div></div>
    </div>`;
  });
  document.getElementById('stepperEl').innerHTML=h;
}

// ─── CHIPS ────────────────────────────────────────────────────────────
function renderChips(){
  let h='';
  if(S.step>=2&&S.svc) h+=`<div class="sel-chip"><span class="cl">서비스</span>${svcName()}</div>`;
  if(S.step>=3&&S.area) h+=`<div class="sel-chip"><span class="cl">영역</span>${areaName()}</div>`;
  if(S.step>=4&&S.tmpl) h+=`<div class="sel-chip"><span class="cl">템플릿</span>${tmplName()}</div>`;
  document.getElementById('chipsBar').innerHTML=h;
}

// ─── STEP CONTENT ─────────────────────────────────────────────────────
function renderStep(){
  const el=document.getElementById('stepContent');
  if(S.step===1) el.innerHTML=renderS1();
  else if(S.step===2) el.innerHTML=renderS2();
  else if(S.step===3) el.innerHTML=renderS3();
  else if(S.step===4) el.innerHTML=renderS4();
}

function renderS1(){
  return `<div class="step-q">설계 대상 서비스의 유형을 선택하세요</div>
  <div class="step-q-sub">선택한 유형을 기준으로 적합한 Page Template 목록이 제공됩니다.</div>
  <div class="svc-grid">${SVC.map(s=>`
  <div class="svc-card${S.svc===s.id?' sel':''}" onclick="pickSvc('${s.id}')">
    <div class="svc-ico"><svg viewBox="0 0 24 24">${s.icon}</svg></div>
    <div class="svc-name">${s.name}</div>
    <div class="svc-desc">${s.desc}</div>
  </div>`).join('')}</div>`;
}

function renderS2(){
  const n=svcName();
  return `<div class="step-q">설계할 화면 영역을 선택하세요</div>
  <div class="step-q-sub">Front는 최종 사용자 화면, Admin은 운영자·관리자 화면입니다.</div>
  <div class="area-grid">
    <div class="area-card${S.area==='front'?' sel':''}" onclick="pickArea('front')">
      <div class="area-badge">Front</div>
      <div class="area-title">Front</div>
      <div class="area-desc">최종 사용자 또는 고객이 보는 화면입니다.<br>서비스의 주요 기능과 콘텐츠를 제공합니다.</div>
      <div class="area-eg-lbl">${n} 예시</div>
      <div class="area-examples">${AREA_EG.front[S.svc]||''}</div>
    </div>
    <div class="area-card${S.area==='admin'?' sel':''}" onclick="pickArea('admin')">
      <div class="area-badge">Admin</div>
      <div class="area-title">Admin</div>
      <div class="area-desc">운영자, 관리자, 내부 담당자가 사용하는 화면입니다.<br>데이터 관리, 승인, 설정 기능을 제공합니다.</div>
      <div class="area-eg-lbl">${n} 예시</div>
      <div class="area-examples">${AREA_EG.admin[S.svc]||''}</div>
    </div>
  </div>`;
}

function renderS3(){
  const key=`${S.svc}-${S.area}`;
  const list=TMPLS[key]||[];
  if(!list.length) return `<div style="color:var(--t3);padding:20px 0">해당 조합의 템플릿이 없습니다.</div>`;
  const cards=list.map(t=>{
    const secs=t.sections.slice(0,5).map(s=>`<div class="tmpl-si">${s}</div>`).join('');
    const more=t.sections.length>5?`<div class="tmpl-si" style="color:var(--t3);font-style:italic">+ ${t.sections.length-5}개 더</div>`:'';
    return `<div class="tmpl-card${S.tmpl&&S.tmpl.id===t.id?' sel':''}" onclick="pickTmpl('${key}','${t.id}')">
      <div class="tmpl-name">${t.name}</div>
      <div class="tmpl-tgt">${svcName()} ${areaName()}</div>
      <div class="tmpl-meta"><span class="tmpl-tag">섹션 ${t.sections.length}개</span><span class="tmpl-tag">blocks ${t.blocks}개</span></div>
      <div class="tmpl-desc">${t.desc}</div>
      <div class="tmpl-sl">기본 포함 섹션</div>
      ${secs}${more}
    </div>`;
  }).join('');
  return `<div class="step-q">Page Template을 선택하세요</div>
  <div class="step-q-sub">선택한 템플릿 기준으로 기본 wireframe blocks가 생성됩니다. Editor에서 자유롭게 편집할 수 있습니다.</div>
  <div class="tmpl-grid">${cards}</div>`;
}

function renderS4(){
  if(!S.form.id||S.form.id==='SC-001') S.form.id=autoId();
  const n=svcName(), a=areaName(), t=tmplName(), b=S.tmpl?S.tmpl.blocks:0;
  return `<div class="step-q">기본 정보를 입력하세요</div>
  <div class="step-q-sub">Editor 진입 후에도 수정할 수 있습니다.</div>
  <div class="s4-wrap">
    <div>
      <div class="frow2">
        <div class="fgrp">
          <label class="flbl">화면 ID<span class="req">*</span></label>
          <input class="finp" id="fId" value="${S.form.id}" placeholder="SC-MAIN-001" oninput="S.form.id=this.value">
          <div class="fhint">자동 채번됩니다. 직접 수정 가능합니다.</div>
        </div>
        <div class="fgrp">
          <label class="flbl">화면명<span class="req">*</span></label>
          <input class="finp" id="fName" value="${S.form.name}" placeholder="${n} ${t}" oninput="S.form.name=this.value">
        </div>
      </div>
      <div class="frow2">
        <div class="fgrp">
          <label class="flbl">업무영역</label>
          <input class="finp" value="${S.form.domain}" placeholder="예: 상품, 주문, 회원" oninput="S.form.domain=this.value">
        </div>
        <div class="fgrp">
          <label class="flbl">담당자</label>
          <input class="finp" value="${S.form.owner}" placeholder="담당자 이름 또는 팀" oninput="S.form.owner=this.value">
        </div>
      </div>
      <div class="fgrp">
        <label class="flbl">초기 상태</label>
        <div class="st-radios">
          ${['draft','review','confirmed'].map(v=>`<label class="st-r"><input type="radio" name="st" value="${v}" ${S.form.status===v?'checked':''} onchange="S.form.status='${v}'">${stLabel(v)}</label>`).join('')}
        </div>
      </div>
      <div class="fgrp">
        <label class="flbl">설명 메모</label>
        <textarea class="finp" placeholder="이 화면에 대한 간략한 설명이나 맥락을 입력하세요." oninput="S.form.memo=this.value">${S.form.memo}</textarea>
      </div>
    </div>
    <div class="sum-panel">
      <div class="sum-ttl">선택 요약</div>
      <div class="sum-row"><span class="sum-lbl">서비스 유형</span><span class="sum-val">${n}</span></div>
      <div class="sum-row"><span class="sum-lbl">화면 영역</span><span class="sum-val">${a}</span></div>
      <div class="sum-row"><span class="sum-lbl">Page Template</span><span class="sum-val">${t}</span></div>
      <div class="sum-blocks"><div class="sum-num">${b}</div><div class="sum-sub">생성될 기본 wireframe blocks</div></div>
    </div>
  </div>`;
}

// ─── PICK ACTIONS ─────────────────────────────────────────────────────
function pickSvc(id){ S.svc=id; S.area=null; S.tmpl=null; renderStep(); }
function pickArea(a){ S.area=a; S.tmpl=null; renderStep(); }
function pickTmpl(key,id){ S.tmpl=(TMPLS[key]||[]).find(t=>t.id===id)||null; renderStep(); }

// ─── NAV ─────────────────────────────────────────────────────────────
function prevStep(){ if(S.step>1){S.step--;renderAll();} }
function nextStep(){
  if(S.step===1&&!S.svc){alert('서비스 유형을 선택하세요.');return;}
  if(S.step===2&&!S.area){alert('화면 영역을 선택하세요.');return;}
  if(S.step===3&&!S.tmpl){alert('Page Template을 선택하세요.');return;}
  if(S.step===4){enterEditor();return;}
  S.step++; renderAll();
}
function goToStep(n){ if(n<S.step){S.step=n;renderAll();} }

function renderAll(){
  renderStepper(); renderChips(); renderStep(); updateFtBtns();
}
function updateFtBtns(){
  document.getElementById('btnPrev').disabled=S.step<=1;
  document.getElementById('btnNext').textContent=S.step===4?'Editor로 진입':'다음 단계';
}

// ─── EDITOR ──────────────────────────────────────────────────────────
function enterEditor(){
  S.blocks=(S.tmpl?S.tmpl.sections:[]).map((name,i)=>({id:i,name,desc:BLK_DESC[name]||'화면 구성 요소',visible:true}));
  S.selBlock=null; S.inspTab='props';
  if(!S.form.name) S.form.name=svcName()+' '+tmplName();
  document.getElementById('viewSel').classList.add('dn');
  document.getElementById('viewEd').classList.remove('dn');
  renderCtxBar(); renderCompLib(); renderCanvas(); renderInspEmpty();
}

function renderCtxBar(){
  const id=S.form.id||autoId(), nm=S.form.name||'제목 없음';
  document.getElementById('ctxBar').innerHTML=`
    <button class="ctx-back" onclick="backToSel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>목록
    </button>
    <div class="ctx-sep"></div>
    <span class="ctx-id">${id}</span>
    <span class="ctx-name">${nm}</span>
    <span class="ctx-chip sc">${stLabel(S.form.status)}</span>
    <div class="ctx-flex"></div>
    <span class="ctx-chip">${svcName()}</span>
    <span class="ctx-chip">${areaName()}</span>
    <span class="ctx-chip">${tmplName()}</span>
    <button class="ctx-change" onclick="backToSel()">선택 변경</button>`;
}

function renderCompLib(){
  let h='';
  Object.entries(COMP_LIB).forEach(([cat,items])=>{
    const open=['레이아웃','콘텐츠','입력','공통 참조'].includes(cat);
    const isRef=cat==='공통 참조';
    h+=`<div class="comp-cat${open?' open':''}">
      <div class="cc-hdr" onclick="this.closest('.comp-cat').classList.toggle('open')">${cat}
        <svg class="cc-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
      </div>
      <div class="cc-items">${items.map(item=>`
        <div class="comp-item"><span class="ci-dot"></span><span class="ci-name">${item}</span>${isRef?'<span class="ref-badge">REF</span>':''}</div>`).join('')}
      </div></div>`;
  });
  document.getElementById('clBody').innerHTML=h;
}

function renderCanvas(){
  const blks=S.blocks.map((b,i)=>`
    <div class="wf-block${S.selBlock===i?' sel':''}${!b.visible?' hidden':''}" onclick="selBlk(${i})">
      <div class="wf-drag-handle" onclick="demoDrag(event,${i})" title="드래그하여 순서 변경 (클릭으로 상태 미리보기)">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="currentColor">
          <circle cx="2" cy="2" r="1.2"/><circle cx="6" cy="2" r="1.2"/>
          <circle cx="2" cy="7" r="1.2"/><circle cx="6" cy="7" r="1.2"/>
          <circle cx="2" cy="12" r="1.2"/><circle cx="6" cy="12" r="1.2"/>
        </svg>
      </div>
      <div class="wf-num">${String(i+1).padStart(2,'0')}</div>
      <div class="wf-body"><div class="wf-bname">${b.name}</div><div class="wf-bdesc">${b.desc}</div></div>
      <div class="wf-acts">
        <button class="wf-act" title="${b.visible?'숨기기':'표시'}" onclick="togBlk(event,${i})">
          ${b.visible
            ?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>`
            :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`}
        </button>
        <button class="wf-act" title="위로" onclick="movBlk(event,${i},-1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button class="wf-act" title="아래로" onclick="movBlk(event,${i},1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button class="wf-act del" title="삭제" onclick="delBlk(event,${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`).join('');
  document.getElementById('wfInner').innerHTML=`
    <div class="canvas-top">
      <div class="canvas-info">
        <div class="canvas-ttl">${tmplName()} — Wireframe</div>
        <div class="canvas-sub">${svcName()} ${areaName()} · blocks ${S.blocks.length}개</div>
      </div>
      <button class="canvas-prev-btn" onclick="openPrev()">미리보기</button>
    </div>${blks}`;
}

function selBlk(i){
  S.selBlock=S.selBlock===i?null:i;
  renderCanvas();
  S.selBlock!==null ? renderInspContent() : renderInspEmpty();
}
function togBlk(e,i){ e.stopPropagation(); S.blocks[i].visible=!S.blocks[i].visible; renderCanvas(); }
function movBlk(e,i,d){ e.stopPropagation(); const j=i+d; if(j<0||j>=S.blocks.length)return; [S.blocks[i],S.blocks[j]]=[S.blocks[j],S.blocks[i]]; if(S.selBlock===i)S.selBlock=j; else if(S.selBlock===j)S.selBlock=i; renderCanvas(); }
function delBlk(e,i){ e.stopPropagation(); S.blocks.splice(i,1); if(S.selBlock===i){S.selBlock=null;renderInspEmpty();} else if(S.selBlock>i)S.selBlock--; renderCanvas(); }

// ─── INSPECTOR ────────────────────────────────────────────────────────
function renderInspEmpty(){
  document.getElementById('inspSub').textContent='컴포넌트를 선택하면 속성을 편집할 수 있습니다';
  document.getElementById('inspBody').innerHTML=`
    <div class="insp-empty">
      <div class="insp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="14" y2="12"/><line x1="8" y1="16" x2="11" y2="16"/></svg></div>
      <div class="insp-em-msg">컴포넌트를 선택하세요</div>
      <div class="insp-em-sub">속성, 표시/권한, 액션/연결,<br>데이터/검증 정보를 편집할 수 있습니다.</div>
    </div>`;
}

function renderInspContent(){
  const b=S.blocks[S.selBlock]; if(!b)return;
  document.getElementById('inspSub').textContent=b.name;
  const tabs=['속성','표시/권한','액션/연결','데이터/검증'];
  const tabsH=tabs.map(t=>`<button class="insp-tab${S.inspTab===t?' on':''}" onclick="setTab('${t}')">${t}</button>`).join('');
  let p='';
  if(S.inspTab==='속성'){
    p=`<div class="if"><div class="iflbl">컴포넌트명</div><input class="ifinp" value="${b.name}" oninput="S.blocks[${S.selBlock}].name=this.value;renderCanvas()"></div>
    <div class="if"><div class="iflbl">표시 제목</div><input class="ifinp" placeholder="화면에 표시될 제목 (선택)"></div>
    <div class="if"><div class="iflbl">설명</div><input class="ifinp" value="${b.desc}" oninput="S.blocks[${S.selBlock}].desc=this.value;renderCanvas()"></div>
    <div class="ifdiv"></div>
    <div class="if"><div class="iflbl">중요도</div>
      <div class="irg">
        <label class="iri"><input type="radio" name="imp${S.selBlock}" value="h"><span class="imp-h">높음</span>&nbsp;필수 핵심 영역</label>
        <label class="iri"><input type="radio" name="imp${S.selBlock}" value="m" checked><span class="imp-m">중간</span>&nbsp;권장 포함 영역</label>
        <label class="iri"><input type="radio" name="imp${S.selBlock}" value="l"><span class="imp-l">낮음</span>&nbsp;선택 또는 보조 영역</label>
      </div></div>`;
  } else if(S.inspTab==='표시/권한'){
    p=`<div class="if"><div class="iflbl">노출 대상</div>
      <div class="irg">${['전체','로그인 사용자','비로그인 사용자','관리자','조건부 노출'].map((v,i)=>`<label class="iri"><input type="radio" name="vis${S.selBlock}" value="${v}" ${i===0?'checked':''}>${v}</label>`).join('')}
      </div></div>`;
  } else if(S.inspTab==='액션/연결'){
    const auths=[{id:'SC-AUTH-001',name:'로그인'},{id:'SC-AUTH-002',name:'회원가입'},{id:'SC-AUTH-003',name:'ID/PW 찾기'},{id:'SC-AUTH-004',name:'처리 완료'}];
    p=`<div class="if"><div class="iflbl">연결 화면</div><input class="ifinp" placeholder="화면 ID 또는 이름 검색"></div>
    <div class="ifseclbl">인증 화면 참조</div>
    ${auths.map(a=>`<div class="isl"><div><div class="isl-id">${a.id}</div><div class="isl-name">${a.name}</div></div><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg></div>`).join('')}
    <div class="inotice">로그인/회원가입/찾기 화면은 별도 화면설계서로 작성하고, 현재 화면에서는 버튼 또는 링크 액션으로 연결합니다.</div>`;
  } else if(S.inspTab==='데이터/검증'){
    p=`<div class="if"><div class="iflbl">데이터 출처</div><input class="ifinp" placeholder="예: API /products/list, 로컬 상태"></div>
    <div class="if"><div class="iflbl">필수 여부</div><div class="irg"><label class="iri"><input type="radio" name="req${S.selBlock}" value="y">필수</label><label class="iri"><input type="radio" name="req${S.selBlock}" value="n" checked>선택</label></div></div>
    <div class="if"><div class="iflbl">검증 규칙</div><input class="ifinp" placeholder="예: 최소 1개 이상, 최대 20자"></div>
    <div class="if"><div class="iflbl">오류 메시지</div><input class="ifinp" placeholder="예: 필수 항목입니다."></div>`;
  }
  document.getElementById('inspBody').innerHTML=`
    <div class="insp-content">
      <div class="insp-tabs">${tabsH}</div>
      <div class="insp-panel">${p}</div>
    </div>`;
}
function setTab(t){ S.inspTab=t; renderInspContent(); }

// ─── DRAG HANDLE DEMO ─────────────────────────────────────────────────
// 실제 drag/drop 구현 없음 — docs Preview UI 상태 표시 전용
// 제품 통합 시: HTML5 DnD API 또는 sortable 라이브러리로 교체
function demoDrag(e, i){
  e.stopPropagation();
  const blocks = document.querySelectorAll('.wf-block');
  const wasOn = blocks[i] && blocks[i].classList.contains('is-dragging');
  // 전체 초기화
  blocks.forEach(b => b.classList.remove('is-dragging'));
  document.querySelectorAll('.wf-drop-indicator,.wf-drop-placeholder').forEach(el=>el.remove());
  if(!wasOn && blocks[i]){
    blocks[i].classList.add('is-dragging');
    // drop indicator: 다음 블록 아래
    const targetIdx = (i + 1 < blocks.length) ? i + 1 : i - 1;
    if(targetIdx >= 0 && blocks[targetIdx]){
      const ind = document.createElement('div');
      ind.className = 'wf-drop-indicator';
      blocks[targetIdx].after(ind);
      const placeholder = document.createElement('div');
      placeholder.className = 'wf-drop-placeholder';
      placeholder.textContent = '여기에 놓기';
      ind.after(placeholder);
    }
    // 2초 후 자동 초기화 (데모용)
    setTimeout(()=>{
      blocks.forEach(b=>b.classList.remove('is-dragging'));
      document.querySelectorAll('.wf-drop-indicator,.wf-drop-placeholder').forEach(el=>el.remove());
    }, 2000);
  }
}

// ─── PREVIEW C안 Review Sheet ───────────────────────────────────────
// LAYOUT_EXCEPTION: PREVIEW_REVIEW_SHEET
// 제품 통합 시: .prev-ov top:48px, left:var(--sw) 또는 left:0 결정 필요
let PV = { lit: null };

function openPrev(){
  const id=S.form.id||autoId(), nm=S.form.name||'제목 없음';
  document.getElementById('prevId').textContent=id;
  document.getElementById('prevName').textContent=nm;
  const stMap={draft:'phc-draft',review:'phc-review',confirmed:'phc-confirmed'};
  const chip=document.getElementById('prevStatus');
  chip.className='prev-hdr-chip '+(stMap[S.form.status]||'phc-draft');
  chip.textContent=stLabel(S.form.status);
  const today=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
  document.getElementById('prevMeta').textContent='작성자: '+(S.form.owner||'미지정')+' · '+today;
  PV.lit=null;
  pvRenderMock(); pvRenderDesc(); pvCheckMissing();
  document.getElementById('prevOv').classList.add('open');
}

function pvRenderMock(){
  const vis=S.blocks.filter(b=>b.visible);
  if(!vis.length){ document.getElementById('prevMockBody').innerHTML='<div style="padding:20px;text-align:center;font-size:11px;color:var(--t3)">wireframe 블록이 없습니다.</div>'; return; }
  document.getElementById('prevMockBody').innerHTML=vis.map((b,i)=>`
    <div class="pmf-blk${PV.lit===i?' lit':''}" onclick="pvLit(${i})">
      <div class="pmf-badge">${String(i+1).padStart(2,'0')}</div>
      <div class="pmf-blk-name">${b.name}</div>
      <div class="pmf-blk-lines"><div class="pmf-bline" style="width:${58+i*4}%"></div><div class="pmf-bline" style="width:${40+i*3}%"></div></div>
    </div>`).join('');
}

function pvRenderDesc(){
  const vis=S.blocks.filter(b=>b.visible);
  const el=document.getElementById('prevDescBody');
  if(!vis.length){
    el.innerHTML=`<div class="desc-empty-state"><div class="des-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="14" y2="12"/></svg></div><div class="des-msg">등록된 블록이 없습니다</div><div class="des-sub">Editor에서 Page Template을 선택하면<br>기본 블록이 자동 생성됩니다.</div></div>`;
    return;
  }
  const fld=(lbl,val)=>`<div class="desc-field"><span class="dflbl">${lbl}</span><span class="${val?'dfval':'dfempty'}">${val||'미입력'}</span></div>`;
  el.innerHTML=vis.map((b,i)=>{
    const isMissing=!b.desc||b.desc==='화면 구성 요소';
    return `<div class="desc-item${PV.lit===i?' lit':''}" id="pvd${i}" onclick="pvLit(${i})">
      <div class="desc-item-top">
        <div class="desc-num">${String(i+1).padStart(2,'0')}</div>
        <div class="desc-item-name">${b.name}</div>
        <div class="desc-st ${isMissing?'dst-miss':'dst-ok'}">${isMissing?'미작성':'완료'}</div>
      </div>
      <div class="desc-fields">
        ${fld('설명',isMissing?'':b.desc)}
        ${fld('표시 조건','')}
        ${fld('연결 화면','')}
        ${fld('데이터 출처','')}
      </div>
    </div>`;
  }).join('');
}

function pvLit(i){
  PV.lit=PV.lit===i?null:i;
  pvRenderMock(); pvRenderDesc();
  if(PV.lit!==null){
    const dc=document.getElementById('prevDescCol');
    const di=document.getElementById('pvd'+PV.lit);
    if(dc&&di){ const off=di.offsetTop-dc.offsetTop-40; dc.scrollTop=Math.max(0,off); }
    const mc=document.getElementById('prevMockCol');
    const mblks=mc?mc.querySelectorAll('.pmf-blk'):[];
    if(mc&&mblks[PV.lit]){ const off=mblks[PV.lit].offsetTop-mc.offsetTop-40; mc.scrollTop=Math.max(0,off); }
  }
}

function pvCheckMissing(){
  const vis=S.blocks.filter(b=>b.visible);
  const cnt=vis.filter(b=>!b.desc||b.desc==='화면 구성 요소').length;
  const el=document.getElementById('prevMissing');
  const txt=document.getElementById('prevMissingTxt');
  if(cnt>0){ el.classList.remove('dn'); txt.textContent=`필수 미작성 항목 ${cnt}개 — 검토요청 전 확인이 필요합니다.`; }
  else el.classList.add('dn');
}

function closePrev(){ document.getElementById('prevOv').classList.remove('open'); }
function prevTempSave(){ tempSave(); }
function prevSave(){ saveSpec(); }
function prevSaveReview(){
  const vis=S.blocks.filter(b=>b.visible);
  const miss=vis.filter(b=>!b.desc||b.desc==='화면 구성 요소').length;
  if(miss>0&&!confirm(`필수 미작성 항목이 ${miss}개 있습니다.\n그래도 검토요청을 진행하시겠습니까?`)) return;
  saveReview(); closePrev();
}

// ─── SAVE / BACK ──────────────────────────────────────────────────────
function backToSel(){
  document.getElementById('viewEd').classList.add('dn');
  document.getElementById('viewSel').classList.remove('dn');
  renderAll();
}
function setSI(cls,txt){ const el=document.getElementById('edSI'); el.className='ed-si '+cls; document.getElementById('edSITxt').textContent=txt; }
function tempSave(){ setSI('saved','임시저장됨'); }
function saveSpec(){ setSI('saved','저장됨'); renderCtxBar(); }
function saveReview(){ saveSpec(); S.form.status='review'; renderCtxBar(); }

// ─── INIT ─────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
