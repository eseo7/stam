<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로젝트 없음 — STAM</title>
  <link rel="icon" href="../../assets/brand/stam/stam_favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../assets/fonts/s-core-dream/s-core-dream.css">
  <link rel="stylesheet" href="../../css/stam.tokens.css">
  <link rel="stylesheet" href="../../css/stam.shell.css">
  <link rel="stylesheet" href="../../css/stam.components.css">
  <link rel="stylesheet" href="../../css/stam.auth.css">
  <link rel="stylesheet" href="../../css/stam.form-controls.css">
</head>
<body class="stam-auth-page" data-stam-auth-screen="no-project">

  <header class="stam-auth-page__bar">
    <div class="stam-auth-page__bar-logo">
      <img src="../../assets/brand/stam/stam_icon_primary_transparent.png" alt="STAM">
      <span>STAM</span>
    </div>
    <button class="tbtn" data-theme-toggle type="button">☾ 다크모드</button>
  </header>

  <main class="stam-auth-page__main" id="stam-auth-main">
    <div class="stam-auth-shell">
      <div class="stam-auth-card" data-screen-label="No Project">

        <div class="stam-auth-status-icon stam-auth-status-icon--todo" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>

        <span class="status-badge s-todo">프로젝트 없음</span>

        <h1 class="stam-auth-title">첫 프로젝트를 만들어 주세요</h1>

        <p class="stam-auth-desc">
          Google 로그인은 완료되었습니다.<br>
          새 프로젝트를 만들면 Owner 권한으로 바로 시작할 수 있습니다.
        </p>

        <p class="stam-auth-desc stam-auth-desc--sub">
          프로젝트 멤버 초대와 세부 권한 관리는 이후 단계에서 확장됩니다.
        </p>

        <div class="stam-auth-state-card" data-stam-user-info>
          <div class="stam-auth-state-card__row">
            <span class="stam-auth-state-card__label">로그인 계정</span>
            <span class="stam-auth-state-card__value" data-stam-user-email>—</span>
          </div>
          <div class="stam-auth-state-card__row">
            <span class="stam-auth-state-card__label">표시 이름</span>
            <span class="stam-auth-state-card__value" data-stam-user-display-name>—</span>
          </div>
          <div class="stam-auth-state-card__row">
            <span class="stam-auth-state-card__label">프로젝트 연결</span>
            <span class="stam-auth-state-card__value"><span class="status-badge s-todo">연결 없음</span></span>
          </div>
        </div>

        <div class="stam-auth-btn-stack" data-stam-project-create-root>
          <div class="stam-form-field">
            <label class="stam-label" for="stam-no-project-create-name">프로젝트 이름</label>
            <input class="stam-input" id="stam-no-project-create-name" type="text" data-stam-project-create-name placeholder="프로젝트 이름을 입력하세요" maxlength="80">
          </div>
          <button class="stam-btn stam-btn--lg stam-btn--primary stam-btn--block" type="button" data-stam-auth-action="create-project">
            <span class="stam-btn__label">새 프로젝트 만들기</span>
          </button>
          <p class="stam-auth-helper" data-stam-project-create-message hidden></p>
        </div>

        <div class="stam-auth-btn-stack">
          <button class="stam-btn stam-btn--md stam-btn--secondary stam-btn--block" type="button" data-stam-auth-action="sign-out">로그아웃</button>
        </div>

        <div class="stam-auth-link-row">
          <button class="stam-btn stam-btn--text" type="button" data-stam-auth-action="contact-admin">관리자에게 문의</button>
        </div>

      </div>
    </div>
  </main>

  <script src="/__/firebase/8.10.1/firebase-app.js"></script>
  <script src="/__/firebase/8.10.1/firebase-auth.js"></script>
  <script src="/__/firebase/8.10.1/firebase-firestore.js"></script>
  <script src="/__/firebase/init.js"></script>
  <script src="../../js/stam.auth-membership-gate.js"></script>
  <script src="../../js/stam.auth-user-bootstrap.js"></script>
  <script src="../../js/stam.auth-project-create.js"></script>
  <script src="../../js/stam.auth-bootstrap.js"></script>
  <script src="../../js/stam.theme.js"></script>

</body>
</html>
