<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판 만들기 — STAM Board Builder</title>
  <link rel="icon" href="../../assets/brand/stam/stam_favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../assets/fonts/s-core-dream/s-core-dream.css">
  <link rel="stylesheet" href="../../css/stam.tokens.css">
  <!-- 공통 scrollbar helper(.stam-scrollbar) + --stam-scrollbar-* token (PR-B 승격). -->
  <link rel="stylesheet" href="../../css/stam.scrollbar.css">
  <!-- chip tone(.bf-chip--*) 재사용 목적으로만 link (board-factory.css 수정 없음). -->
  <link rel="stylesheet" href="../../css/stam.board-factory.css">
  <!-- Board Builder 컴포넌트 스타일(버튼/입력폼/탭/템플릿 카드·칩) — inline 에서 분리(PR-C-1). -->
  <link rel="stylesheet" href="../../css/stam.board-builder.css">
  <!--
    Board Builder Admin Preview v1 — standalone preview (PR: board builder admin preview)
    · 회차 4: "config/schema editor" 느낌 제거 → 비개발자용 "게시판 만들기" UX 로 보정.
      단계형 좌측(① 기본 정보 → ② 필드 구성 → ③ 초안 만들기) + 항상 살아있는 우측 미리보기.
      key / raw type / engine 매핑은 "고급 설정"으로 접어 기본 노출에서 제거.
    · App Shell / Left Menu / nav-data 에 붙지 않는 독립 preview 페이지.
    · 색/폰트는 stam.tokens.css + 자체서빙 S-Core Dream 만 사용 (외부 CDN 0).
    · 입력 → Board Factory config 생성 → localStorage 저장 → 화면 내 preview.
    · Firestore / API 호출 없음. 실제 게시판 생성/저장 아님.
    · 컴포넌트·레이아웃 스타일(bb- prefix)은 board-builder.html 전용 `stam.board-builder.css` 로 분리(PR-C-1·C-2),
      잔여(field-card / preview / table / JSON)만 inline <style>. 공통 token / 전역 CSS 미변경.
  -->
  <style>
    /* page base · .bb-wrap · header · shell · action bar · narrow fallback
       → stam.board-builder.css (PR-C-2 분리). 잔여 inline = steps / field-card / preview / table / JSON. */

    /* ── scrollbar 톤 ─────────────────────────────────────────────────
       공통 `stam.scrollbar.css` `.stam-scrollbar` helper + `--stam-scrollbar-*` token 으로 일원화.
       좌측 `.bb-form-scroll`(static) 및 JS 렌더 스크롤 영역(.bb-tabpanels / .bb-brd-tblwrap /
       .bb-json / .bb-adv-v)에 `.stam-scrollbar` class 를 직접 적용 → Board Builder 전용 scrollbar
       규칙/토큰 없음(전부 공통 helper 담당). */

    /* ── steps ── */
    .bb-step { padding: 18px 0 0; }
    .bb-step + .bb-step { border-top: 1px solid var(--bd); margin-top: 18px; }
    .bb-step-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .bb-step-n { width: 23px; height: 23px; border-radius: 50%; background: var(--stam); color: #fff; font-size: 11px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .bb-step-lbl { font-size: 14px; font-weight: 700; color: var(--t1); letter-spacing: -.015em; }
    .bb-step-sub { font-size: 10.5px; color: var(--bb-muted); margin-left: auto; white-space: nowrap; }
    .bb-step-body { padding-left: 33px; }

    /* form controls · template cards · top chips → stam.board-builder.css (PR-C-1 분리) */

    /* ── field section ── */
    .bb-fld-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .bb-fld-badge { display: inline-flex; align-items: center; height: 20px; padding: 0 9px; border-radius: 99px; font-size: 10.5px; font-weight: 700; background: var(--stam-soft); color: var(--stam); border: 1px solid rgba(84,81,232,.20); }
    .bb-fld-hint { font-size: 10.5px; color: var(--bb-muted); margin-left: auto; text-align: right; line-height: 1.4; }
    .bb-fields { display: flex; flex-direction: column; gap: 10px; }

    /* field card — 기본 노출: 필드명/입력방식/필수/표시위치/옵션. key·raw type·매핑은 고급 설정. */
    .bb-fcard { border: 1px solid var(--bd); border-radius: var(--r-lg); background: var(--bg-sur); box-shadow: 0 1px 2px rgba(15,23,42,.04); overflow: hidden; transition: border-color 120ms, box-shadow 120ms, opacity 120ms; }
    .bb-fcard:hover { border-color: var(--bd-s); }
    .bb-fcard.is-system { background: linear-gradient(0deg, var(--bg-sur), var(--bg-sur)); }
    .bb-fcard.is-dragging { opacity: .5; border-color: var(--stam); }
    .bb-fcard.drop-before { box-shadow: inset 0 3px 0 var(--stam); }
    .bb-fcard.drop-after { box-shadow: inset 0 -3px 0 var(--stam); }
    .bb-fc-main { display: flex; align-items: flex-start; gap: 9px; padding: 11px 12px 12px; }
    .bb-fc-rail { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; padding-top: 3px; }
    .bb-drag { cursor: grab; color: var(--bb-muted); font-size: 13px; line-height: 1; letter-spacing: -3px; user-select: none; }
    .bb-drag:active { cursor: grabbing; }
    .bb-fc-no { font-size: 10px; font-weight: 800; color: var(--t3); }
    .bb-fc-body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
    .bb-fc-row1 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .bb-fc-name { flex: 1 1 130px; font-weight: 600; padding: 7px 9px; font-size: 12.5px; }
    .bb-fc-type { flex: 0 1 132px; padding: 7px 9px; font-size: 11.5px; }
    .bb-fc-lock { display: inline-flex; align-items: center; gap: 3px; font-size: 9.5px; font-weight: 700; color: var(--stam); background: var(--stam-soft); border: 1px solid rgba(84,81,232,.20); border-radius: 99px; padding: 2px 7px; white-space: nowrap; }
    .bb-fchip { font-size: 9.5px; font-weight: 700; color: var(--t3); background: var(--bg-sur2); border: 1px solid var(--bd); border-radius: 99px; padding: 2px 7px; white-space: nowrap; }
    .bb-fc-row2 { display: flex; align-items: center; gap: 8px 9px; flex-wrap: wrap; }
    .bb-fc-uselbl { font-size: 10px; color: var(--bb-muted); font-weight: 600; }
    .bb-fc-sep { width: 1px; height: 14px; background: var(--bd); }
    .bb-chk { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--t2); white-space: nowrap; cursor: pointer; }
    .bb-chk input { accent-color: var(--stam); margin: 0; }
    /* 필수 = badge 형태 checkbox */
    .bb-chk--req { font-weight: 700; padding: 2px 9px 2px 7px; border-radius: 99px; border: 1px solid var(--bd); background: var(--bg-sur2); color: var(--t3); }
    .bb-chk--req.is-on { background: rgba(220,38,38,.07); color: var(--fail); border-color: rgba(220,38,38,.22); }
    .bb-chk--req.is-locked { cursor: not-allowed; opacity: .8; }
    .bb-fc-opts { padding: 7px 9px; font-size: 11.5px; }
    .bb-fc-actions { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
    /* .bb-iconbtn* → stam.board-builder.css (PR-C-1) */
    /* advanced */
    .bb-fc-adv-tog { display: flex; align-items: center; gap: 6px; width: 100%; padding: 7px 12px; border: 0; border-top: 1px solid var(--bd); background: var(--bg-sur2); color: var(--t3); font-family: var(--font); font-size: 10.5px; font-weight: 700; cursor: pointer; transition: color 120ms, background 120ms; }
    .bb-fc-adv-tog:hover { color: var(--t1); background: var(--bg-sur3); }
    .bb-fc-adv-arr { transition: transform 150ms; display: inline-block; }
    .bb-fc-adv-tog.is-open .bb-fc-adv-arr { transform: rotate(180deg); }
    .bb-fc-adv-meta { margin-left: auto; font-weight: 600; color: var(--bb-muted); }
    .bb-fc-adv { padding: 10px 12px 12px; background: var(--bg-sur2); border-top: 1px solid var(--bd); display: flex; flex-direction: column; gap: 8px; }
    .bb-fc-adv[hidden] { display: none; }
    .bb-adv-row { display: grid; grid-template-columns: 78px 1fr; align-items: center; gap: 9px; }
    .bb-adv-k { font-size: 10.5px; color: var(--t3); font-weight: 600; }
    .bb-adv-v { font-size: 10.5px; color: var(--t2); background: var(--bg-sur3); padding: 4px 8px; border-radius: var(--r-sm); border: 1px solid var(--bd); font-family: var(--mono); overflow-x: auto; white-space: nowrap; }
    .bb-adv-key { font-size: 11.5px; padding: 6px 9px; font-family: var(--mono); }

    /* action bar(.bb-actions / .bb-actions-status) → stam.board-builder.css (PR-C-2) */

    /* ── preview (right, 항상 표시 · 고정 패널 · 내부만 스크롤) ── */
    .bb-preview { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .bb-rp-head { flex: 0 0 auto; padding: 15px 20px 14px; background: var(--bg-sur); border-bottom: 1px solid var(--bd); }
    .bb-rp-head-ttl { font-size: 11px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 11px; }
    .bb-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    @media (max-width: 560px) { .bb-stats { grid-template-columns: repeat(2, 1fr); } }
    .bb-stat { padding: 10px 12px; background: var(--bg-sur2); border-radius: var(--r-md); border: 1px solid var(--bd); }
    .bb-stat-n { font-size: 22px; font-weight: 800; letter-spacing: -.03em; line-height: 1.1; }
    .bb-stat-l { font-size: 10px; color: var(--t3); font-weight: 600; margin-top: 2px; }
    /* .bb-tabs / .bb-tab* → stam.board-builder.css (PR-C-1) */
    .bb-tabpanels { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 18px 20px 22px; }   /* scrollbar 톤: 공통 .stam-scrollbar (element class, JS 렌더) */
    .bb-tabpanel { display: flex; flex-direction: column; gap: 14px; }
    .bb-tabpanel[hidden] { display: none; }

    /* board mock (현재 구성 기준 예상 게시판 화면) */
    .bb-brd { background: var(--bg-sur); border: 1px solid var(--bd); border-radius: var(--r-lg); overflow: hidden; box-shadow: 0 4px 14px rgba(15,23,42,.06); }
    .bb-brd-top { background: var(--navy, #0D1235); padding: 9px 14px; display: flex; align-items: center; gap: 8px; }
    .bb-brd-top-ttl { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.82); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bb-brd-top-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: rgba(84,81,232,.28); color: #A9A1FB; letter-spacing: .04em; flex-shrink: 0; }
    .bb-brd-hdr { padding: 13px 16px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .bb-brd-hdr-ttl { font-size: 15px; font-weight: 700; color: var(--t1); letter-spacing: -.02em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bb-brd-hdr-acts { display: flex; gap: 6px; flex-shrink: 0; }
    .bb-mk-pri { padding: 6px 12px; border-radius: var(--r-md); background: var(--stam); color: #fff; font-size: 11px; font-weight: 700; }
    .bb-mk-sec { padding: 6px 11px; border-radius: var(--r-md); background: var(--bg-sur2); color: var(--t2); border: 1px solid var(--bd); font-size: 11px; font-weight: 600; }
    .bb-brd-fbar { padding: 9px 16px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; gap: 7px; background: var(--bg-sur2); flex-wrap: wrap; }
    .bb-mk-search { flex: 1 1 120px; min-width: 100px; height: 28px; padding: 0 10px; border: 1px solid var(--bd); border-radius: var(--r-md); background: var(--bg-sur); font-size: 11px; color: var(--bb-muted); display: inline-flex; align-items: center; gap: 6px; }
    .bb-mk-chip { padding: 4px 10px; border-radius: 6px; font-size: 10.5px; font-weight: 600; border: 1px solid var(--stam); background: var(--stam-soft); color: var(--stam); white-space: nowrap; }
    .bb-brd-tblwrap { overflow-x: auto; }
    .bb-ptable { width: 100%; border-collapse: collapse; min-width: 560px; }
    .bb-ptable th { text-align: left; font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .04em; padding: 8px 12px; background: var(--bg-sur2); white-space: nowrap; border-bottom: 1px solid var(--bd); }
    .bb-ptable td { padding: 10px 12px; font-size: 12px; color: var(--t2); border-bottom: 1px solid var(--bd); white-space: nowrap; vertical-align: middle; }
    .bb-ptable tbody tr:last-child td { border-bottom: 0; }
    .bb-th-chk, .bb-td-chk { width: 34px; text-align: center; }
    .bb-id { font-size: 11px; font-weight: 700; color: var(--stam); }
    .bb-name { font-weight: 600; color: var(--t1); }
    .bb-user { color: var(--t2); }
    .bb-link { color: var(--stam); }
    .bb-rowbtn { border: 1px solid var(--bd-s); background: var(--bg-sur); border-radius: var(--r-sm); padding: 2px 9px; font-size: 11px; color: var(--t3); }

    .bb-notice {
      font-size: 11px; color: var(--t3); line-height: 1.6; padding: 9px 12px;
      border: 1px solid var(--bd); border-left: 3px solid var(--bd-s); border-radius: var(--r-md); background: var(--bg-sur2);
    }
    .bb-notice code { font-family: var(--mono); font-size: 10.5px; color: var(--t2); }

    .bb-pgroup-h { font-size: 10.5px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .bb-taglist { display: flex; flex-wrap: wrap; gap: 6px; }
    .bb-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--t1); background: var(--bg-sur); border: 1px solid var(--bd); border-radius: var(--r-sm); padding: 4px 9px; }
    .bb-tag em { font-style: normal; color: var(--bb-muted); font-family: var(--mono); font-size: 10px; }
    .bb-tag .bb-req { color: var(--fail); }
    .bb-empty { font-size: 11.5px; color: var(--bb-muted); }

    .bb-json-bar { display: flex; align-items: center; gap: 10px; }
    .bb-copy-status { font-size: 11px; color: var(--t2); }
    .bb-json {
      width: 100%; min-height: 340px; font-family: var(--mono); font-size: 11.5px; line-height: 1.55; color: var(--t1);
      background: var(--bg-base); border: 1px solid var(--bd); border-radius: var(--r-md); padding: 10px 12px; resize: vertical;
    }

  </style>
</head>
<body>
  <main class="bb-wrap" id="bb-app">
    <header class="bb-head">
      <div>
        <div class="bb-eyebrow"><span class="bb-dot"></span>BOARD FACTORY · 게시판 만들기</div>
        <h1 class="bb-title">게시판 만들기</h1>
        <p class="bb-sub">필드와 화면 구성을 선택하면 게시판 초안을 생성할 수 있습니다. 오른쪽에서 무엇이 만들어질지 바로 확인하세요.</p>
        <div class="bb-chips">
          <span class="bb-sc bb-sc--preview">Admin Preview</span>
          <span class="bb-sc">Local</span>
          <span class="bb-sc">No DB</span>
        </div>
      </div>
      <div class="bb-head-r">
        <a class="bb-back" href="./index.html" title="Board Factory v2 Preview Index">← 목록</a>
        <button type="button" class="bb-theme" data-theme-toggle
          onclick="if(window.STAM&amp;&amp;window.STAM.toggleTheme)window.STAM.toggleTheme()">☾ 다크모드</button>
      </div>
    </header>

    <div class="bb-shell">
      <!-- 좌측: 단계형 입력 (상단 헤더 고정 · 내부 스크롤 · 하단 액션바 고정) -->
      <section class="bb-panel bb-panel--form">
        <div class="bb-form-scroll stam-scrollbar">

        <!-- STEP 1 -->
        <div class="bb-step">
          <div class="bb-step-hdr">
            <span class="bb-step-n">1</span>
            <span class="bb-step-lbl">게시판 기본 정보</span>
            <span class="bb-step-sub">필수 항목</span>
          </div>
          <div class="bb-step-body">
            <div class="bb-form-grid">
              <div class="bb-field">
                <label class="bb-lbl" for="bb-category">카테고리</label>
                <select class="bb-select" id="bb-category" data-bb="category">
                  <option>산출물 관리</option>
                  <option>관리/설정</option>
                  <option>프로젝트 관리</option>
                </select>
              </div>
              <div class="bb-field">
                <label class="bb-lbl" for="bb-title">게시판명</label>
                <input class="bb-input" id="bb-title" data-bb="title" type="text" placeholder="예) 테스트 시나리오" autocomplete="off">
              </div>
              <div class="bb-field bb-full">
                <label class="bb-lbl" for="bb-slug">게시판 코드 <span class="bb-opt">자동 생성</span></label>
                <div class="bb-slug-row">
                  <input class="bb-input" id="bb-slug" data-bb="slug" type="text" placeholder="예) test-scenario" autocomplete="off">
                  <button type="button" class="bb-btn bb-btn--ghost bb-btn--sm bb-autobtn" data-bb-action="auto-slug" title="게시판명에서 코드 자동 생성">코드 자동 생성</button>
                </div>
                <div class="bb-hint">게시판명을 기반으로 생성됩니다. 직접 수정할 수도 있습니다.</div>
              </div>
              <div class="bb-field bb-full">
                <label class="bb-lbl" for="bb-desc">설명 <span class="bb-opt">선택</span></label>
                <textarea class="bb-textarea" id="bb-desc" data-bb="description" placeholder="이 게시판의 용도나 운영 방침을 입력하세요."></textarea>
              </div>
              <div class="bb-field bb-full">
                <label class="bb-lbl">기본 템플릿</label>
                <div class="bb-tpl-grid" data-bb-templates>
                  <button type="button" class="bb-tpl-card is-sel" data-bb-tpl="notice">
                    <span class="bb-tpl-ico">📋</span>
                    <span class="bb-tpl-name">공지사항</span>
                    <span class="bb-tpl-desc">제목·내용·첨부 기본</span>
                  </button>
                  <button type="button" class="bb-tpl-card" data-bb-tpl="free">
                    <span class="bb-tpl-ico">💬</span>
                    <span class="bb-tpl-name">자유 게시판</span>
                    <span class="bb-tpl-desc">기본 게시판 구조</span>
                  </button>
                  <button type="button" class="bb-tpl-card" data-bb-tpl="archive">
                    <span class="bb-tpl-ico">🗂️</span>
                    <span class="bb-tpl-name">자료실</span>
                    <span class="bb-tpl-desc">파일 첨부 중심</span>
                  </button>
                  <button type="button" class="bb-tpl-card" data-bb-tpl="qna">
                    <span class="bb-tpl-ico">❓</span>
                    <span class="bb-tpl-name">Q&amp;A</span>
                    <span class="bb-tpl-desc">질문·답변 구조</span>
                  </button>
                  <button type="button" class="bb-tpl-card" data-bb-tpl="issue">
                    <span class="bb-tpl-ico">🏷️</span>
                    <span class="bb-tpl-name">요청/이슈</span>
                    <span class="bb-tpl-desc">상태·우선순위 포함</span>
                  </button>
                  <button type="button" class="bb-tpl-card" data-bb-tpl="custom">
                    <span class="bb-tpl-ico">＋</span>
                    <span class="bb-tpl-name">직접 구성</span>
                    <span class="bb-tpl-desc">필드 자유 편집</span>
                  </button>
                </div>
                <div class="bb-tpl-note">템플릿은 시작점 예시입니다. 필드 구성은 아래에서 자유롭게 편집할 수 있습니다.</div>
              </div>
            </div>
          </div>
        </div>

        <!-- STEP 2 -->
        <div class="bb-step">
          <div class="bb-step-hdr">
            <span class="bb-step-n">2</span>
            <span class="bb-step-lbl">필드 구성</span>
            <span class="bb-fld-badge" data-bb-fieldcount>0개 필드</span>
          </div>
          <div class="bb-step-body">
            <div class="bb-fld-head">
              <span class="bb-fld-hint">⋮⋮ 드래그로 순서 변경 · 목록/필터/입력폼 표시 토글 · 고급 설정에서 key·매핑</span>
            </div>
            <div class="bb-fields" data-bb-fields></div>
            <button type="button" class="bb-btn bb-addfield" data-bb-action="add-field">＋ 필드 추가</button>
          </div>
        </div>

        </div><!-- /bb-form-scroll -->

        <!-- 좌측 하단 고정 액션바 (③ 게시판 초안 만들기) -->
        <div class="bb-form-foot">
          <div class="bb-actions">
            <button type="button" class="bb-btn bb-btn--reset" data-bb-action="reset" title="입력·미리보기·localStorage 초기화">초기화</button>
            <button type="button" class="bb-btn bb-btn--ghost" data-bb-action="copy">JSON 복사</button>
            <button type="button" class="bb-btn bb-btn--primary" data-bb-action="generate">게시판 초안 보기</button>
          </div>
          <span class="bb-actions-status" data-bb-copy-status aria-live="polite"></span>
        </div>

      </section>

      <!-- 우측: 항상 살아있는 미리보기 -->
      <section class="bb-panel bb-panel--preview">
        <div class="bb-preview" data-bb-preview></div>
      </section>
    </div>
  </main>
